name: AI Bridge Reranker

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: |
          python3 -m py_compile scripts/ai_bridge_reranker.py
          python3 -m py_compile torshield_ai_gateway/model_selector.py

  rerank:
    name: Rerank AI Models
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -q 2>/dev/null || true

      - name: Run AI Bridge Reranker
        env:
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          cat > /tmp/reranker_script.py << 'ENDSCRIPT'
          import sys
          sys.path.insert(0, ".")
          from scripts.ai_bridge_reranker import main
          main()
          ENDSCRIPT
          python3 /tmp/reranker_script.py

      - name: Upload reranker report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: reranker-report
          path: reranker_report.json
          retention-days: 7
