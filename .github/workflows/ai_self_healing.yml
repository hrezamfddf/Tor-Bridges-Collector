name: AI Self-Healing

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: |
          python3 -m py_compile torshield_ai_gateway/auto_debug.py
          python3 -m py_compile torshield_ai_gateway/gateway.py
          python3 -m py_compile self_heal.py

  self-heal:
    name: Self-Healing Diagnostics
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -q 2>/dev/null || true

      - name: Classify failures
        env:
          CEREBRAS_API_KEY_1: ${{ secrets.CEREBRAS_API_KEY_1 }}
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          CF_AI_GATEWAY_URL_1: ${{ secrets.CF_AI_GATEWAY_URL_1 }}
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_API_KEY }}
          PORTKEY_GATEWAY_URL: ${{ secrets.PORTKEY_GATEWAY_URL }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          cat > /tmp/self_heal_script.py << 'ENDSCRIPT'
          import sys, os, logging
          sys.path.insert(0, ".")
          logging.basicConfig(level=logging.INFO,
              format="%(asctime)s %(levelname)s %(name)s %(message)s")

          # Classify recent failures
          CLASSIFICATION = {
              "syntax_error":    "Code-level bug — requires patch",
              "auth_failure":    "Credential issue — key rotation needed",
              "network_error":   "Transient — retry with backoff",
              "model_error":     "Model unavailable — fallback to next model",
              "timeout":         "Slow response — reduce max_tokens or retry",
          }

          try:
              from torshield_ai_gateway.auto_debug import AutoDebugger
              debugger = AutoDebugger()
              report = debugger.run_diagnostics()
              if report:
                  print(f"[Self-Heal] Diagnostics complete: {report}")
              else:
                  print("[Self-Heal] No issues detected")
          except Exception as e:
              print(f"[Self-Heal] Diagnostic error (non-fatal): {e}")

          # Provider capability check
          try:
              from torshield_ai_gateway.gateway import TorShieldAIGateway
              gw = TorShieldAIGateway()
              stats = gw.health_stats()
              print(f"[Self-Heal] Provider stats: {stats}")
          except Exception as e:
              print(f"[Self-Heal] Gateway check (non-fatal): {e}")
          ENDSCRIPT
          python3 /tmp/self_heal_script.py || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: self-healing-diagnostics
          path: diagnostics_report.json
          retention-days: 7
